name: CI Pipeline Finalon:  push:    branches:      - masterjobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout Code        uses: actions/checkout@v4      - name: Setup Python        uses: actions/setup-python@v5        with:          python-version: '3.9'      - name: Install Dependencies        run: |          python -m pip install --upgrade pip          pip install pytest      - name: Run Unit Tests        run: pytest      - name: SonarCloud Scan        uses: SonarSource/sonarqube-scan-action@v2        with:          args: >            -Dsonar.projectKey=akulahimabindu2107_cicd_project            -Dsonar.organization=akulahimabindu2107            -Dsonar.host.url=https://sonarcloud.io            -Dsonar.sources=.        env:          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}        - name: Run Tests with Coverage          run: |              pip install pytest pytest-cov              pytest --cov=etl_processing --cov-report=xml      - name: Run Python Script        run: python etl_script.py