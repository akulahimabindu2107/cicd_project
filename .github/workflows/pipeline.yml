name: CI Sonar Pipelineon:  push:    branches:      - masterjobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout Code        uses: actions/checkout@v4      - name: Setup Python        uses: actions/setup-python@v5        with:          python-version: '3.9'      - name: Install Dependencies        run: |          python -m pip install --upgrade pip          pip install pytest pytest-cov      - name: Run Tests and Generate Coverage        run: |          pytest --cov=. --cov-report=xml      - name: SonarCloud Scan        uses: SonarSource/sonarqube-scan-action@v2        with:          args: >            -Dsonar.projectKey=akulahimabindu2107_cicd_project            -Dsonar.organization=akulahimabindu2107            -Dsonar.host.url=https://sonarcloud.io            -Dsonar.sources=.            -Dsonar.python.coverage.reportPaths=coverage.xml        env:          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}