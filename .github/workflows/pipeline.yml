name: CI Pipeline with Tests and Sonaron:  push:    branches:      - masterjobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout Code        uses: actions/checkout@v4      - name: Setup Python        uses: actions/setup-python@v5        with:          python-version: '3.9'      - name: Install Dependencies        run: |          python -m pip install --upgrade pip          pip install pytest      - name: Run Unit Tests        run: pytest      - name: SonarCloud Scan        uses: SonarSource/sonarqube-scan-action@v2        env:            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      - name: Run Python Script        run: python first.py